<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEDCO Supply — Digital Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --blue: #0C4CA3;
  --red: #BB141B;
  --white: #fff;
  --off: #f4f4f4;
  --border: #d0d0d0;
  --text: #222;
  --muted: #666;
  --shadow: 0 8px 40px rgba(0,0,0,0.22);
  --page-w: 480px;
  --page-h: 640px;
}

html, body {
  height: 100%;
  font-family: 'Open Sans', sans-serif;
  background: #1a1a1a;
  color: var(--text);
  overflow: hidden;
}

/* ── TOOLBAR ── */
.toolbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: #111;
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 0 16px;
  z-index: 100;
  border-bottom: 1px solid #333;
}

.toolbar-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-right: 16px;
  flex-shrink: 0;
}
.toolbar-logo svg { width: 28px; height: 28px; }
.toolbar-logo-text {
  font-size: 15px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.02em;
}
.toolbar-logo-sub {
  font-size: 10px;
  color: #888;
  font-weight: 400;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  display: block;
}

.toolbar-divider {
  width: 1px;
  height: 28px;
  background: #333;
  margin: 0 8px;
}

.tb-btn {
  width: 36px;
  height: 36px;
  background: none;
  border: none;
  border-radius: 6px;
  color: #aaa;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s, color 0.12s;
  font-size: 14px;
  position: relative;
}
.tb-btn:hover { background: #2a2a2a; color: #fff; }
.tb-btn.active { background: #2a2a2a; color: var(--red); }
.tb-btn[title]:hover::after {
  content: attr(title);
  position: absolute;
  bottom: -30px;
  left: 50%;
  transform: translateX(-50%);
  background: #000;
  color: #fff;
  font-size: 11px;
  white-space: nowrap;
  padding: 3px 8px;
  border-radius: 4px;
  pointer-events: none;
  z-index: 200;
}

.page-counter {
  background: #2a2a2a;
  border: 1px solid #444;
  color: #ddd;
  font-size: 13px;
  font-weight: 600;
  padding: 4px 14px;
  border-radius: 6px;
  min-width: 90px;
  text-align: center;
  cursor: default;
  font-family: 'Open Sans', monospace;
}

.toolbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
}
.toolbar-contact {
  font-size: 12px;
  color: #666;
  margin-right: 8px;
}
.toolbar-contact strong { color: #aaa; }

/* ── SEARCH OVERLAY ── */
.search-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  align-items: flex-start;
  justify-content: center;
  padding-top: 80px;
}
.search-overlay.open { display: flex; }
.search-box {
  background: #1e1e1e;
  border: 1px solid #444;
  border-radius: 10px;
  width: 600px;
  max-width: 90vw;
  overflow: hidden;
}
.search-input-wrap {
  display: flex;
  align-items: center;
  padding: 0 16px;
  border-bottom: 1px solid #333;
}
.search-input-wrap svg { color: #666; flex-shrink: 0; }
.search-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-family: inherit;
  font-size: 16px;
  color: #fff;
  padding: 16px 12px;
}
.search-results {
  max-height: 400px;
  overflow-y: auto;
}
.search-result-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  cursor: pointer;
  border-bottom: 1px solid #2a2a2a;
  transition: background 0.1s;
}
.search-result-item:hover { background: #2a2a2a; }
.search-result-icon {
  width: 32px;
  height: 32px;
  background: #2a2a2a;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--red);
  flex-shrink: 0;
}
.search-result-name { font-size: 13px; color: #ddd; font-weight: 600; }
.search-result-model { font-size: 11px; color: #666; margin-top: 2px; }
.search-result-cat { margin-left: auto; font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0; }
.search-empty { padding: 32px; text-align: center; color: #555; font-size: 14px; }

/* ── THUMBNAILS OVERLAY ── */
.thumb-overlay {
  display: none;
  position: fixed;
  inset: 52px 0 0 0;
  background: #111;
  z-index: 150;
  overflow-y: auto;
  padding: 24px;
}
.thumb-overlay.open { display: block; }
.thumb-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  max-width: 1200px;
  margin: 0 auto;
}
.thumb-item {
  background: #1e1e1e;
  border: 2px solid #333;
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.12s;
}
.thumb-item:hover { border-color: var(--red); transform: translateY(-2px); }
.thumb-item.current { border-color: var(--blue); }
.thumb-page {
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
  background: #fff;
  font-size: 10px;
  color: #666;
}
.thumb-label {
  padding: 6px 8px;
  font-size: 10px;
  color: #aaa;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: center;
}

/* ── STAGE ── */
.stage {
  position: fixed;
  top: 52px; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at center, #2a2a2a 0%, #111 100%);
}

/* ── SIDE NAV TABS ── */
.side-tabs {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 3px;
  z-index: 10;
}
.side-tabs.left { left: 0; }
.side-tabs.right { right: 0; }
.side-tab {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  background: var(--red);
  color: white;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 12px 7px;
  cursor: pointer;
  border-radius: 0 4px 4px 0;
  transition: background 0.15s, padding 0.15s;
  white-space: nowrap;
  max-height: 130px;
  overflow: hidden;
  text-overflow: ellipsis;
  user-select: none;
}
.side-tabs.left .side-tab { border-radius: 0 4px 4px 0; transform: rotate(180deg); }
.side-tabs.right .side-tab { border-radius: 4px 0 0 4px; }
.side-tab:hover { background: #8f0f14; padding-left: 10px; }
.side-tab.active { background: var(--blue); }

/* ── PAGE TURN ARROWS ── */
.turn-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 48px;
  height: 80px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  color: #aaa;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 20;
  transition: background 0.15s, color 0.15s;
}
.turn-arrow:hover { background: rgba(255,255,255,0.14); color: #fff; }
.turn-arrow.prev { left: 8px; }
.turn-arrow.next { right: 8px; }
.turn-arrow:disabled { opacity: 0.2; cursor: not-allowed; }

/* ── BOOK SPREAD ── */
.book-wrap {
  position: relative;
  display: flex;
  align-items: stretch;
  filter: drop-shadow(0 12px 48px rgba(0,0,0,0.6));
}

.book-page {
  width: var(--page-w);
  height: var(--page-h);
  background: var(--white);
  overflow: hidden;
  position: relative;
  transition: opacity 0.2s;
}
.book-page.left {
  border-right: 1px solid #bbb;
  box-shadow: inset -6px 0 12px rgba(0,0,0,0.08);
}
.book-page.right {
  box-shadow: inset 6px 0 12px rgba(0,0,0,0.08);
}

/* Spine shadow */
.book-spine {
  width: 12px;
  background: linear-gradient(to right, #bbb, #e8e8e8, #bbb);
  flex-shrink: 0;
  position: relative;
}
.book-spine::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.15), transparent, rgba(0,0,0,0.1));
}

/* Page curl effect */
.book-page::after {
  content: '';
  position: absolute;
  bottom: 0;
  right: 0;
  width: 0;
  height: 0;
  transition: width 0.2s, height 0.2s;
}
.book-page.left::after {
  bottom: 0; left: 0; right: auto;
}
.book-page:hover::after {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.06) 50%);
}

/* Page number footer */
.page-num {
  position: absolute;
  bottom: 10px;
  font-size: 11px;
  color: #aaa;
  font-weight: 600;
}
.book-page.left .page-num { left: 16px; }
.book-page.right .page-num { right: 16px; }

/* ── PAGE CONTENT STYLES ── */

/* Cover page */
.page-cover {
  height: 100%;
  background: var(--blue);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
  position: relative;
  overflow: hidden;
}
.page-cover::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 300px; height: 300px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
}
.page-cover::after {
  content: '';
  position: absolute;
  bottom: -40px; left: -40px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: rgba(0,0,0,0.1);
}
.cover-accent {
  width: 100%;
  height: 5px;
  background: linear-gradient(to right, var(--red), var(--blue));
  margin-bottom: 40px;
}
.cover-logo-mark {
  margin-bottom: 24px;
}
.cover-title {
  font-size: 32px;
  font-weight: 800;
  color: white;
  text-align: center;
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin-bottom: 12px;
}
.cover-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  text-align: center;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 40px;
}
.cover-year {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  position: absolute;
  bottom: 24px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.cover-divider {
  width: 48px;
  height: 3px;
  background: var(--red);
  margin: 0 auto 24px;
}

/* TOC page */
.page-toc {
  padding: 28px 28px 28px 28px;
  height: 100%;
  display: flex;
  flex-direction: column;
}
.toc-header {
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 2px solid var(--red);
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.toc-header-title {
  font-size: 14px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--blue);
}
.toc-header-sub {
  font-size: 10px;
  color: #aaa;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.toc-section {
  margin-bottom: 14px;
}
.toc-section-title {
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--red);
  margin-bottom: 6px;
  padding-left: 0;
}
.toc-entry {
  display: flex;
  align-items: baseline;
  gap: 0;
  padding: 3px 0;
  cursor: pointer;
  transition: color 0.1s;
}
.toc-entry:hover .toc-name { color: var(--blue); }
.toc-name {
  font-size: 11.5px;
  color: var(--text);
  flex: 1;
}
.toc-dots {
  flex: 1;
  border-bottom: 1px dotted #ccc;
  margin: 0 6px;
  position: relative;
  top: -2px;
  min-width: 20px;
}
.toc-pg {
  font-size: 11px;
  color: var(--blue);
  font-weight: 700;
  flex-shrink: 0;
}

/* Section divider page */
.page-section {
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  padding: 48px 40px;
  position: relative;
  overflow: hidden;
}
.page-section.bg-blue { background: var(--blue); }
.page-section.bg-dark { background: #1a1a2e; }
.section-number {
  font-size: 96px;
  font-weight: 800;
  color: rgba(255,255,255,0.08);
  position: absolute;
  top: 20px;
  right: 20px;
  line-height: 1;
  letter-spacing: -0.04em;
}
.section-eyebrow {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: rgba(255,255,255,0.5);
  margin-bottom: 12px;
}
.section-title {
  font-size: 38px;
  font-weight: 800;
  color: white;
  line-height: 1.05;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
}
.section-accent {
  width: 48px;
  height: 4px;
  background: var(--red);
  margin-bottom: 20px;
}
.section-desc {
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  line-height: 1.6;
  max-width: 280px;
}

/* Product list page */
.page-products {
  padding: 0;
  height: 100%;
  display: flex;
  flex-direction: column;
}
.prod-page-header {
  background: var(--blue);
  padding: 14px 20px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.prod-page-cat {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.7);
}
.prod-page-title {
  font-size: 15px;
  font-weight: 800;
  color: white;
  letter-spacing: -0.01em;
}
.prod-page-count {
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  background: rgba(255,255,255,0.1);
  padding: 2px 8px;
  border-radius: 10px;
}
.prod-list {
  flex: 1;
  overflow: hidden;
  padding: 8px 0;
}
.prod-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 9px 20px;
  border-bottom: 1px solid #f0f0f0;
  cursor: pointer;
  transition: background 0.1s;
}
.prod-row:hover { background: #f7f9ff; }
.prod-row:last-child { border-bottom: none; }
.prod-icon {
  width: 36px;
  height: 36px;
  background: #f0f4fa;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--blue);
}
.prod-info { flex: 1; min-width: 0; }
.prod-model {
  font-size: 10px;
  font-weight: 700;
  color: var(--red);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 2px;
}
.prod-name {
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 3px;
  line-height: 1.2;
}
.prod-feat {
  font-size: 10px;
  color: var(--muted);
  line-height: 1.35;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.prod-tag {
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  background: #eef2fa;
  color: var(--blue);
  padding: 2px 6px;
  border-radius: 2px;
  flex-shrink: 0;
  align-self: flex-start;
  margin-top: 2px;
}

/* Detail page */
.page-detail {
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 0;
}
.detail-header {
  background: linear-gradient(135deg, var(--blue) 0%, #0a3a80 100%);
  padding: 18px 22px 16px;
}
.detail-eyebrow {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: rgba(255,255,255,0.55);
  margin-bottom: 4px;
}
.detail-model-num {
  font-size: 20px;
  font-weight: 800;
  color: white;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.detail-name {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  line-height: 1.3;
}
.detail-body {
  flex: 1;
  padding: 16px 22px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.detail-section-label {
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--blue);
  margin-bottom: 6px;
}
.detail-features {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 12px;
}
.detail-feature {
  font-size: 10.5px;
  color: var(--text);
  padding-left: 10px;
  position: relative;
  line-height: 1.4;
}
.detail-feature::before {
  content: '';
  position: absolute;
  left: 0;
  top: 6px;
  width: 4px;
  height: 4px;
  background: var(--red);
  border-radius: 50%;
}
.detail-variants {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.detail-variant {
  background: #eef2fa;
  border: 1px solid #d0ddf0;
  color: var(--blue);
  font-size: 9.5px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 2px;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.detail-footer {
  border-top: 2px solid var(--red);
  padding: 12px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.detail-cta {
  background: var(--red);
  color: white;
  border: none;
  border-radius: 3px;
  padding: 7px 14px;
  font-family: inherit;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: background 0.15s;
}
.detail-cta:hover { background: #8f0f14; }
.detail-web {
  font-size: 10px;
  color: var(--muted);
}
.detail-web a { color: var(--blue); }

/* Illustration placeholder */
.prod-illustration {
  width: 100%;
  height: 110px;
  background: #f8f9fc;
  border-bottom: 1px solid #eee;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #ccc;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  gap: 8px;
  flex-direction: column;
}

/* ── FLIP ANIMATION ── */
.page-flip-out-left {
  animation: flipOutLeft 0.25s ease-in forwards;
}
.page-flip-in-left {
  animation: flipInLeft 0.25s ease-out forwards;
}
.page-flip-out-right {
  animation: flipOutRight 0.25s ease-in forwards;
}
.page-flip-in-right {
  animation: flipInRight 0.25s ease-out forwards;
}

@keyframes flipOutLeft {
  from { transform: perspective(1200px) rotateY(0deg); opacity:1; }
  to { transform: perspective(1200px) rotateY(-25deg); opacity:0; }
}
@keyframes flipInLeft {
  from { transform: perspective(1200px) rotateY(25deg); opacity:0; }
  to { transform: perspective(1200px) rotateY(0deg); opacity:1; }
}
@keyframes flipOutRight {
  from { transform: perspective(1200px) rotateY(0deg); opacity:1; }
  to { transform: perspective(1200px) rotateY(25deg); opacity:0; }
}
@keyframes flipInRight {
  from { transform: perspective(1200px) rotateY(-25deg); opacity:0; }
  to { transform: perspective(1200px) rotateY(0deg); opacity:1; }
}

/* ── PRODUCT DETAIL MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 300;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-card {
  background: white;
  width: 520px;
  max-width: 95vw;
  max-height: 85vh;
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  animation: modalIn 0.2s ease;
}
@keyframes modalIn {
  from { opacity:0; transform: scale(0.96) translateY(10px); }
  to { opacity:1; transform: none; }
}
.modal-hd {
  background: var(--blue);
  padding: 20px 24px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.modal-hd-left {}
.modal-hd-eyebrow { font-size: 10px; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px; }
.modal-hd-model { font-size: 22px; font-weight: 800; color: white; letter-spacing: -0.01em; }
.modal-hd-name { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 4px; }
.modal-close {
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
  width: 30px;
  height: 30px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.modal-close:hover { background: rgba(255,255,255,0.2); }
.modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
.modal-section { margin-bottom: 18px; }
.modal-section-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.12em; color: var(--blue); margin-bottom: 10px; }
.modal-features { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; }
.modal-feature {
  font-size: 12px;
  color: #333;
  padding-left: 12px;
  position: relative;
  line-height: 1.4;
}
.modal-feature::before {
  content: '';
  position: absolute;
  left: 0;
  top: 6px;
  width: 5px;
  height: 5px;
  background: var(--red);
  border-radius: 50%;
}
.modal-variants { display: flex; flex-wrap: wrap; gap: 6px; }
.modal-variant {
  background: #eef2fa;
  border: 1px solid #ccd8ee;
  color: var(--blue);
  font-size: 11px;
  font-weight: 700;
  padding: 5px 10px;
  border-radius: 3px;
}
.modal-ft {
  border-top: 1px solid #eee;
  padding: 14px 24px;
  display: flex;
  gap: 10px;
  align-items: center;
}
.btn-red {
  background: var(--red);
  color: white;
  border: none;
  border-radius: 4px;
  padding: 9px 18px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  cursor: pointer;
}
.btn-red:hover { background: #8f0f14; }
.btn-ghost {
  background: none;
  border: 1px solid #ddd;
  border-radius: 4px;
  padding: 9px 18px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  color: #555;
  cursor: pointer;
}
.btn-ghost:hover { border-color: var(--blue); color: var(--blue); }

// Build pages array
function buildPages() {
  const pages = [];
  pages.push({ type: 'cover' });
  pages.push({ type: 'toc' });

  CAT_NAMES.forEach((cat, i) => {
    pages.push({ type: 'section', cat, idx: i });
    const prods = PRODUCTS.filter(p => p.cat === cat);
    const perPage = 9;
    for (let s = 0; s < prods.length; s += perPage) {
      pages.push({ type: 'products', cat, prods: prods.slice(s, s + perPage), idx: i });
    }
  });

  pages.push({ type: 'back' });
  return pages;
}

  switch(pageData.type) {
    case 'cover': return renderCover();
    case 'toc':   return renderTOC();
    case 'section': return renderSectionPage(pageData);
    case 'products': return renderProductsPage(pageData, side);
    case 'back':  return renderBack();

  }

// ══════════════════════════════
//  SPREAD RENDERING
// ══════════════════════════════
function getSpreadPages(spread) {
  const l = PAGES[spread * 2] || null;
  const r = PAGES[spread * 2 + 1] || null;
  return [l, r];
}

function renderSpread(spread, dir) {
  const [lp, rp] = getSpreadPages(spread);
  const lEl = document.getElementById('leftPage');
  const rEl = document.getElementById('rightPage');

  const lNum = spread * 2 + 1;
  const rNum = spread * 2 + 2;
  const total = PAGES.length;

  const animOut = dir === 'next' ? 'page-flip-out-left' : 'page-flip-out-right';
  const animIn  = dir === 'next' ? 'page-flip-in-right' : 'page-flip-in-left';

  lEl.innerHTML = renderPage(lp, 'left') + `<div class="page-num">${lNum}</div>`;
  rEl.innerHTML = renderPage(rp, 'right') + (rp ? `<div class="page-num">${rNum}</div>` : '');

  if (dir) {
    lEl.classList.add(animIn);
    rEl.classList.add(animIn);
    setTimeout(() => {
      lEl.classList.remove(animIn);
      rEl.classList.remove(animIn);
    }, 280);
  }

  document.getElementById('pageCounter').textContent = `${lNum}–${Math.min(rNum, total)} / ${total}`;
  document.getElementById('prevBtn').disabled = spread === 0;
  document.getElementById('nextBtn').disabled = spread >= TOTAL_SPREADS - 1;

  renderSideTabs(spread);
}

// ══════════════════════════════
//  SIDE TABS
// ══════════════════════════════
function renderSideTabs(spread) {
  const leftTabs = document.getElementById('leftTabs');
  const rightTabs = document.getElementById('rightTabs');

  // Find which section we're in
  const currentPageIdx = spread * 2;
  let currentCatIdx = -1;
  const p = PAGES[currentPageIdx];
  if (p && (p.type === 'section' || p.type === 'products')) {
    currentCatIdx = CAT_NAMES.indexOf(p.cat);
  }

  // Left tabs: earlier sections
  const leftCats = CAT_NAMES.slice(0, 3);
  leftTabs.innerHTML = leftCats.map((cat, i) =>
    `<div class="side-tab ${i === currentCatIdx ? 'active' : ''}" onclick="jumpToSection(${i})">${cat}</div>`
  ).join('');

  // Right tabs: later sections
  const rightCats = CAT_NAMES.slice(3);
  rightTabs.innerHTML = rightCats.map((cat, i) =>
    `<div class="side-tab ${(i+3) === currentCatIdx ? 'active' : ''}" onclick="jumpToSection(${i+3})">${cat}</div>`
  ).join('');
}

// ══════════════════════════════
//  NAVIGATION
// ══════════════════════════════
function goToSpread(s) {
  if (isAnimating) return;
  const target = Math.max(0, Math.min(s === 999 ? TOTAL_SPREADS - 1 : s, TOTAL_SPREADS - 1));
  if (target === currentSpread) return;
  const dir = target > currentSpread ? 'next' : 'prev';
  isAnimating = true;
  currentSpread = target;
  renderSpread(currentSpread, dir);
  setTimeout(() => isAnimating = false, 300);
}

function nextSpread() { goToSpread(currentSpread + 1); }
function prevSpread() { goToSpread(currentSpread - 1); }

function jumpToSection(catIdx) {
  // Find the spread that starts with this section
  for (let i = 0; i < PAGES.length; i++) {
    const p = PAGES[i];
    if (p.type === 'section' && p.idx === catIdx) {
      goToSpread(Math.floor(i / 2));
      return;
    }
  }
}

// ══════════════════════════════
//  THUMBNAILS
// ══════════════════════════════
function buildThumbs() {
  const grid = document.getElementById('thumbGrid');
  grid.innerHTML = PAGES.map((p, i) => {
    const spread = Math.floor(i / 2);
    const label = p.type === 'cover' ? 'Cover' :
                  p.type === 'toc' ? 'Contents' :
                  p.type === 'section' ? p.cat :
                  p.type === 'products' ? p.cat :
                  p.type === 'back' ? 'Back Cover' : `Page ${i+1}`;
    let bgColor = '#fff';
    if (p.type === 'cover') bgColor = '#0C4CA3';
    if (p.type === 'section') bgColor = SECTION_COLORS[p.idx] || '#0C4CA3';
    if (p.type === 'back') bgColor = '#121214';

    return `<div class="thumb-item ${spread === currentSpread ? 'current' : ''}" onclick="goToSpread(${spread});toggleThumbs()">
      <div class="thumb-page" style="background:${bgColor}">
        ${p.type === 'cover' || p.type === 'section' || p.type === 'back'
          ? `<svg width="20" height="20" viewBox="0 0 60 60"><polygon points="30,4 56,56 4,56" fill="white" opacity="0.6"/></svg>`
          : `<div style="font-size:9px;color:#aaa;text-align:center;padding:4px">${label.substring(0,30)}</div>`
        }
      </div>
      <div class="thumb-label">${i+1} · ${label.substring(0,20)}</div>
    </div>`;
  }).join('');
}

function toggleThumbs() {
  const o = document.getElementById('thumbOverlay');
  const btn = document.getElementById('thumbBtn');
  const isOpen = o.classList.toggle('open');
  btn.classList.toggle('active', isOpen);
  if (isOpen) {
    document.getElementById('searchOverlay').classList.remove('open');
    document.getElementById('searchBtn').classList.remove('active');
    buildThumbs();
  }
}

  const o = document.getElementById('searchOverlay');

  const isOpen = o.classList.toggle('open');
  btn.classList.toggle('active', isOpen);
  if (isOpen) {
    document.getElementById('thumbOverlay').classList.remove('open');
    document.getElementById('thumbBtn').classList.remove('active');
    document.getElementById('searchInput').focus();
    document.getElementById('searchInput').value = '';
    document.getElementById('searchResults').innerHTML = '<div class="search-empty">Start typing to search 144 products</div>';
  }
}

function doSearch(q) {
  const res = document.getElementById('searchResults');
  if (!q.trim()) {
    res.innerHTML = '<div class="search-empty">Start typing to search 144 products</div>';
    return;
  }
  const matches = PRODUCTS.filter(p =>
    p.name.toLowerCase().includes(q.toLowerCase()) ||
    p.model.toLowerCase().includes(q.toLowerCase()) ||
    p.feat.some(f => f.toLowerCase().includes(q.toLowerCase()))
  ).slice(0, 20);

  if (!matches.length) {
    res.innerHTML = '<div class="search-empty">No results found</div>';
    return;
  }
  res.innerHTML = matches.map(p => `
    <div class="search-result-item" onclick="openModal(${p.id});toggleSearch()">
      <div class="search-result-icon">${typeIcon(p.type, 16)}</div>
      <div>
        <div class="search-result-name">${p.name}</div>
        <div class="search-result-model">${p.model}</div>
      </div>
      <div class="search-result-cat">${p.cat}</div>
    </div>`).join('');
}

// ══════════════════════════════
//  PRODUCT MODAL
// ══════════════════════════════
function openModal(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  document.getElementById('mEyebrow').textContent = p.cat + ' · ' + p.type + ' · ' + p.mat;
  document.getElementById('mModel').textContent = p.model;
  document.getElementById('mName').textContent = p.name;
  document.getElementById('mQuoteBtn').onclick = () => {
    window.location.href = `mailto:sales@jedcosupply.com?subject=Quote Request: ${encodeURIComponent(p.model)}`;
  };

  let body = `<div class="modal-section">
    <div class="modal-section-label">Features</div>
    <div class="modal-features">${p.feat.map(f => `<div class="modal-feature">${f}</div>`).join('')}</div>
  </div>`;

  if (p.vars.length) {
    body += `<div class="modal-section">
      <div class="modal-section-label">Available Models</div>
      <div class="modal-variants">${p.vars.map(v => `<div class="modal-variant">${v}</div>`).join('')}</div>
    </div>`;
  }

  body += `<div style="margin-top:16px;padding-top:14px;border-top:1px solid #f0f0f0;">
    <div style="font-size:10px;color:#aaa;">Search model: <a href="https://www.google.com/search?q=${encodeURIComponent(p.model+' HVAC')}" target="_blank" style="color:#0C4CA3">${p.model}</a></div>
  </div>`;

  document.getElementById('mBody').innerHTML = body;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
function closeModalOuter(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ══════════════════════════════
//  KEYBOARD
// ══════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    if (document.getElementById('searchOverlay').classList.contains('open')) toggleSearch();
    if (document.getElementById('thumbOverlay').classList.contains('open')) toggleThumbs();
  }
  if (document.getElementById('searchOverlay').classList.contains('open')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextSpread();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevSpread();
});

document.getElementById('searchOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('searchOverlay')) toggleSearch();
});

// ══════════════════════════════
//  INIT
// ══════════════════════════════
renderSpread(0, null);
</script>
</body>
</html>
